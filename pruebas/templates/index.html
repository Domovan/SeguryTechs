{% extends "layout.html" %}

{% block title %}Home{% endblock %}

{% block content %}

<head>
    <meta charset="UTF-8">
    <title>Buscar Colonias en el Mapa</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <style>
        #map { height: 500px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.0/socket.io.js"></script>
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="static/js/main.js"></script>
</head>
<head>
    <meta charset="UTF-8">
    <title>Buscar Colonias en el Mapa</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <style>
        /* Estilo para el contenedor del mapa */
        #map {
            height: 500px;
            border: 2px solid #ccc;
            border-radius: 10px;
            margin-top: 20px;
        }

        /* Estilo para el encabezado */
        h1 {
            padding-top: 30px;
            text-align: center;
            color: #2c3e50;
            font-family: 'Arial', sans-serif;
            margin-bottom: 20px;
        }

        /* Estilo para el input de búsqueda */
        #search_input {
            width: 80%;
            padding: 10px;
            margin: 0 auto;
            display: block;
            font-size: 18px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.1);
        }

        /* Estilo para los resultados de la búsqueda */
        #search_results {
            margin: 10px auto;
            width: 80%;
            font-family: 'Arial', sans-serif;
            padding: 10px;
            background-color: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 5px;
            max-height: 200px;
            overflow-y: auto;
            box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.1);
        }

        /* Estilo para cada resultado */
        #search_results div {
            padding: 8px;
            border-bottom: 1px solid #ddd;
            cursor: pointer;
        }

        #search_results div:last-child {
            border-bottom: none;
        }

        /* Estilo cuando se pasa el ratón sobre un resultado */
        #search_results div:hover {
            background-color: #e9ecef;
        }

        /* Estilo del cuerpo */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f1f1f1;
            padding: 20px;
        }

        /* Media queries para pantallas pequeñas */
        @media (max-width: 768px) {
            #search_input {
                width: 100%;
            }

            #search_results {
                width: 100%;
            }

            #map {
                height: 400px;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.0/socket.io.js"></script>
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="static/js/main.js"></script>
</head>

<body>
    <h1>Buscador de Colonias en Aguascalientes</h1>
    <input type="text" id="search_input" placeholder="Escribe el nombre de la colonia">
    <div id="search_results"></div>
    <div id="map"></div>
</body>
</html>
{% endblock %}
