{% extends "layout2.html" %}

{% block title %}Home{% endblock %}

{% block content %}
<head>
    <meta charset="UTF-8">
    <title>Buscar Colonias en el Mapa</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.awesome-markers/2.0.4/leaflet.awesome-markers.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    
    <style>
        /* Estilo para el contenedor principal */
        .container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-top: 10px;
        }

        /* Estilo para el mapa (lado izquierdo) */
        #map {
            flex: 1;
            height: 600px;
            border: 2px solid #ccc;
            border-radius: 10px;
        }

        /* Estilo para la sección de búsqueda (lado derecho) */
        .search-section {
            width: 30%;
            margin-left: 20px;
            font-family: 'Arial', sans-serif;
        }




        /* Resultados de búsqueda */
        #search_results {
            margin-top: 10px;
            font-family: 'Arial', sans-serif;
            padding: 10px;
            background-color: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 5px;
            max-height: 400px;
            overflow-y: auto;
            box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.1);
        }

        /* Estilo de los resultados individuales */
        #search_results div {
            padding: 8px;
            border-bottom: 1px solid #ddd;
            cursor: pointer;
        }

        #search_results div:last-child {
            border-bottom: none;
        }

        #search_results div:hover {
            background-color: #e9ecef;
        }

        /* Botón de calcular ruta */
        #route_button {
            display: none; /* Ocultamos el botón inicialmente */
            margin-top: 10px;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }

        #route_button:hover {
            background-color: #0056b3;
        }

        /* Botón para mostrar las zonas de riesgo */
        #show_risk_areas_button {
            margin-top: 10px;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }

        #show_risk_areas_button:hover {
            background-color: #218838;
        }

        /* Responsive para pantallas pequeñas */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            #map {
                width: 100%;
                height: 400px;
            }
            .search-section {
                width: 100%;
                margin-left: 0;
                margin-top: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Mapa a la izquierda -->
        <div id="map"></div>

        <!-- Sección de búsqueda a la derecha -->
        <div class="search-section">
            <h1>Buscador de Colonias</h1>
            <button id="route_button">Calcular Ruta</button>
            <button id="show_risk_areas_button">Mostrar Zonas de Riesgo</button> <!-- Botón para mostrar áreas de riesgo -->
            <BR>
            <div class="search_bar">
                <input type="text" id="search_input" placeholder="Escribe el nombre de la colonia o código postal">

              </div>
            <div id="search_results"></div>

        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.0/socket.io.js"></script>
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
       <!-- JavaScript -->
  
</body>
{% endblock %}
